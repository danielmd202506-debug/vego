name: Sync VOC data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync VOC data
        run: node scripts/sync-voc-data.mjs
        env:
          VOC_SOURCE_URLS: ${{ secrets.VOC_SOURCE_URLS }}

      - name: Commit updated VOC data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/voc-items.json
          git diff --cached --quiet || git commit -m "Sync VOC data"
          git push
